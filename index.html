<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dome-icile</title>
    <link rel="stylesheet" href="src/styles.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        h1 { font-size: 3em; color: #bb86fc; }
        .btn { background: #03dac6; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 40px; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #1e1e1e; }
        #prompt-output { margin-top: 20px; font-style: italic; color: #cf6679; }
    </style>
</head>
<body>
    <div class="container">
        <h1>dome-icile</h1>
        <p>Construct. Populate. Remember.</p>
        
        <div class="menu">
            <button class="btn">New Palace</button>
            <button class="btn" onclick="toggleSettings()">⚙️ Settings</button>
            <button class="btn">Ritual Mode</button>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🧠 Neural Settings</h2>
                    <button class="close-btn" onclick="toggleSettings()">×</button>
                </div>

                <div class="modal-body">
                    <div class="tabs">
                        <button class="tab active" onclick="showTab('visuals')">👁️ Visuals</button>
                        <button class="tab" onclick="showTab('gatekeeper')">🛡️ Gatekeeper</button>
                        <button class="tab" onclick="showTab('audio')">🔊 Audio</button>
                    </div>

                    <div id="tab-visuals" class="tab-content active">
                        <div class="setting-group">
                            <label>Decay Visualization</label>
                            <select id="set-decay-style" onchange="updateSetting('visuals', 'decayStyle', this.value)">
                                <option value="both">Subtle Combo (Filter + Texture)</option>
                                <option value="filter">Filter Only (Sepia/Blur)</option>
                                <option value="texture">Texture Only (Cobwebs)</option>
                                <option value="none">Disabled</option>
                            </select>
                            <p class="hint">How "dusty" rooms appear when neglected.</p>
                        </div>

                        <div class="setting-group">
                            <label>Dual Coding Labels</label>
                            <div class="toggle-switch">
                                <button onclick="updateSetting('visuals', 'dualCoding', 'hover')">Hover to Reveal (Recall)</button>
                                <button onclick="updateSetting('visuals', 'dualCoding', 'always')">Always Visible (Study)</button>
                            </div>
                        </div>
                    </div>

                    <div id="tab-gatekeeper" class="tab-content">
                        <div class="setting-group">
                            <label>Challenge Mode</label>
                            <select id="set-gk-mode" onchange="updateSetting('gatekeeper', 'mode', this.value)">
                                <option value="dynamic">Dynamic (Scales with streak)</option>
                                <option value="choice">Guide (Multiple Choice)</option>
                                <option value="input">Sentinel (Text Input)</option>
                            </select>
                        </div>
                    </div>

                     <div id="tab-audio" class="tab-content">
                        <div class="setting-group">
                            <label>Voice Engine</label>
                            <select onchange="updateSetting('audio', 'engine', this.value)">
                                <option value="hybrid">Hybrid (OpenAI + Browser)</option>
                                <option value="browser">Browser Native</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid">
             <!-- The Room View (Replaces the old specific cards) -->
            <div class="card">
                <h3>Current Room: The Foyer</h3>
                <div id="room-view" class="room-view">
                    <!-- Items rendered here by app.js -->
                </div>
            </div>

            <div class="card">
                <h3>The Foundry (Test Image Gen)</h3>
                <input type="text" id="userInput" placeholder="Enter boring concept..." style="width: 80%; padding: 10px;">
                <br><br>
                <button class="btn" onclick="generate()">Generate Memory</button>
                <div id="prompt-output"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/app.js"></script>
    <script type="module">
        import { enhancePrompt } from './src/prompt_engine.js';
        
        // Expose generate to window for the button
        window.generate = function() {
            const input = document.getElementById('userInput').value;
            const engineOutput = enhancePrompt(input);
            document.getElementById('prompt-output').innerText = "Engineered Prompt sent to Gemini: " + engineOutput;
            // Here we would actually call the Gemini API with engineOutput
        }
    </script>
</body>
</html>
