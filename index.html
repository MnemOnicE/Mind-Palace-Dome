<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dome-icile</title>
    <link rel="stylesheet" href="src/styles.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        h1 { font-size: 3em; color: #bb86fc; }
        .btn { background: #03dac6; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 40px; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #1e1e1e; }
        #prompt-output { margin-top: 20px; font-style: italic; color: #cf6679; }

        /* Quiz Modal Styles */
        #quiz-modal .modal-content {
            border: 2px solid #cf6679;
        }
        #quiz-modal h2 {
            color: #cf6679;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .quiz-option-btn {
            background: #333;
            color: #fff;
            padding: 10px;
            border: 1px solid #555;
            cursor: pointer;
            text-align: left;
        }
        .quiz-option-btn:hover {
            background: #444;
        }
        #quiz-input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
        }
        #quiz-feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }
        .feedback-success { color: #03dac6; }
        .feedback-failure { color: #cf6679; }

    </style>
</head>
<body>
    <div class="container">
        <h1>dome-icile</h1>
        <p>Construct. Populate. Remember.</p>
        
        <div class="menu">
            <button class="btn">New Palace</button>
            <button id="btn-settings" class="btn">⚙️ Settings</button>
            <button class="btn">Ritual Mode</button>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🧠 Neural Settings</h2>
                    <button class="close-btn" id="close-settings">×</button>
                </div>

                <div class="modal-body">
                    <div class="tabs">
                        <button class="tab active" data-tab="visuals">👁️ Visuals</button>
                        <button class="tab" data-tab="gatekeeper">🛡️ Gatekeeper</button>
                        <button class="tab" data-tab="audio">🔊 Audio</button>
                    </div>

                    <div id="tab-visuals" class="tab-content active">
                        <div class="setting-group">
                            <label>Decay Visualization</label>
                            <select id="set-decay-style" data-category="visuals" data-key="decayStyle">
                                <option value="both">Subtle Combo (Filter + Texture)</option>
                                <option value="filter">Filter Only (Sepia/Blur)</option>
                                <option value="texture">Texture Only (Cobwebs)</option>
                                <option value="none">Disabled</option>
                            </select>
                            <p class="hint">How "dusty" rooms appear when neglected.</p>
                        </div>

                        <div class="setting-group">
                            <label>Dual Coding Labels</label>
                            <div class="toggle-switch">
                                <button class="setting-toggle" data-category="visuals" data-key="dualCoding" data-value="hover">Hover to Reveal (Recall)</button>
                                <button class="setting-toggle" data-category="visuals" data-key="dualCoding" data-value="always">Always Visible (Study)</button>
                            </div>
                        </div>
                    </div>

                    <div id="tab-gatekeeper" class="tab-content">
                        <div class="setting-group">
                            <label>Challenge Mode</label>
                            <select id="set-gk-mode" data-category="gatekeeper" data-key="mode">
                                <option value="dynamic">Dynamic (Scales with streak)</option>
                                <option value="choice">Guide (Multiple Choice)</option>
                                <option value="input">Sentinel (Text Input)</option>
                            </select>
                        </div>
                    </div>

                     <div id="tab-audio" class="tab-content">
                        <div class="setting-group">
                            <label>Voice Engine</label>
                            <select data-category="audio" data-key="engine">
                                <option value="hybrid">Hybrid (OpenAI + Browser)</option>
                                <option value="browser">Browser Native</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- QUIZ MODAL -->
        <div id="quiz-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🛡️ The Gatekeeper</h2>
                    <button class="close-btn" id="close-quiz">×</button>
                </div>
                <div class="modal-body">
                    <p id="quiz-question">What resides here?</p>

                    <div id="quiz-interaction-area">
                        <!-- Dynamic Content: Input or Buttons -->
                    </div>

                    <p id="quiz-feedback"></p>

                    <button id="btn-quiz-submit" class="btn hidden" style="width:100%; margin-top:10px;">Submit</button>
                </div>
            </div>
        </div>

        <div class="grid">
             <!-- The Room View (Replaces the old specific cards) -->
            <div class="card">
                <h3>Current Room: The Foyer</h3>
                <div id="room-view" class="room-view">
                    <!-- Items rendered here by app.js -->
                </div>
            </div>

            <div class="card">
                <h3>The Foundry (Test Image Gen)</h3>
                <input type="text" id="userInput" placeholder="Enter boring concept..." style="width: 80%; padding: 10px;">
                <br><br>
                <button id="btn-generate" class="btn">Generate Memory</button>
                <div id="prompt-output"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/app.js"></script>
</body>
</html>
